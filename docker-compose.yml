services:
  question-service:
    build:
      context: .
      dockerfile: ./questionService/server/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./questionService/server/.env

  client:
    build: ./client
    ports:
      - "3000:3000"

  user-service:
    build:
      context: .
      dockerfile: ./UserService/server/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./UserService/server/.env
