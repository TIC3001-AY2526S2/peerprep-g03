services:
  question-service:
    build:
      context: .
      dockerfile: ./questionService/server/Dockerfile
    ports:
      - "5050:5050"
    env_file:
      - ./questionService/server/.env

  client:
    build: ./client
    ports:
      - "3000:3000"

  user-service:
    build:
      context: .
      dockerfile: ./userService/server/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./userService/server/.env
